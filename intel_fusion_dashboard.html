
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#app { display: flex; flex-direction: column; height: 700px; background: var(--color-background-tertiary); }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: var(--color-background-primary); border-bottom: 0.5px solid var(--color-border-tertiary); }
.topbar-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.status-row { display: flex; gap: 8px; }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 99px; font-weight: 500; }
.badge-osint { background: #E6F1FB; color: #0C447C; }
.badge-humint { background: #EAF3DE; color: #27500A; }
.badge-imint { background: #FAEEDA; color: #633806; }
.badge-est { background: #FBEAF0; color: #72243E; }
.main { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 220px; background: var(--color-background-primary); border-right: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; }
.sidebar-section { padding: 12px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.sidebar-label { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.filter-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.filter-name { font-size: 12px; color: var(--color-text-primary); display: flex; align-items: center; gap: 6px; }
.dot-legend { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.toggle { width: 28px; height: 16px; border-radius: 8px; border: none; cursor: pointer; position: relative; transition: background 0.2s; }
.toggle.on { background: #378ADD; }
.toggle.off { background: var(--color-border-tertiary); }
.toggle-knob { width: 12px; height: 12px; border-radius: 50%; background: white; position: absolute; top: 2px; transition: left 0.2s; }
.toggle.on .toggle-knob { left: 14px; }
.toggle.off .toggle-knob { left: 2px; }
.ingest-btn { width: 100%; font-size: 12px; padding: 7px 10px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; color: var(--color-text-primary); text-align: left; margin-bottom: 6px; }
.ingest-btn:hover { background: var(--color-background-tertiary); }
.drop-zone { border: 1px dashed var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 10px; text-align: center; font-size: 11px; color: var(--color-text-secondary); cursor: pointer; margin-top: 4px; }
.drop-zone.drag-over { border-color: #378ADD; background: #E6F1FB; color: #0C447C; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 12px; }
.stat-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px; text-align: center; }
.stat-num { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.stat-lbl { font-size: 10px; color: var(--color-text-secondary); margin-top: 2px; }
#map-area { flex: 1; position: relative; overflow: hidden; background: #1a2535; }
#map-svg { width: 100%; height: 100%; }
.popup { position: absolute; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 12px; width: 200px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); pointer-events: none; z-index: 10; display: none; }
.popup-header { font-size: 12px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; }
.popup-img { width: 100%; height: 80px; border-radius: 6px; object-fit: cover; margin-bottom: 6px; background: var(--color-background-secondary); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--color-text-secondary); }
.popup-meta { font-size: 11px; color: var(--color-text-secondary); line-height: 1.5; }
.popup-type { font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 99px; display: inline-block; margin-bottom: 4px; }
.log-panel { height: 120px; background: #0d1117; border-top: 0.5px solid #30363d; overflow-y: auto; padding: 8px 12px; font-family: var(--font-mono); font-size: 11px; }
.log-line { color: #7ee787; margin-bottom: 2px; }
.log-line.warn { color: #e3b341; }
.log-line.info { color: #58a6ff; }
.map-node { cursor: pointer; transition: opacity 0.2s; }
.map-node:hover { opacity: 0.8; }
.node-pulse { animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.toolbar { position: absolute; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 6px; z-index: 5; }
.map-btn { width: 32px; height: 32px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; color: var(--color-text-primary); }
.map-btn:hover { background: var(--color-background-secondary); }
</style>

<div id="app">
  <div class="topbar">
    <div class="topbar-title">Strategic Fusion Dashboard — Operational View</div>
    <div class="status-row">
      <span class="badge badge-osint">OSINT: 4</span>
      <span class="badge badge-humint">HUMINT: 3</span>
      <span class="badge badge-imint">IMINT: 3</span>
      <span id="live-badge" class="badge" style="background:#EAF3DE;color:#27500A;">● LIVE</span>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Layers</div>
        <div class="filter-row"><span class="filter-name"><span class="dot-legend" style="background:#378ADD"></span>OSINT</span><button class="toggle on" id="t-osint" onclick="toggleLayer('osint',this)"><span class="toggle-knob"></span></button></div>
        <div class="filter-row"><span class="filter-name"><span class="dot-legend" style="background:#3B6D11"></span>HUMINT</span><button class="toggle on" id="t-humint" onclick="toggleLayer('humint',this)"><span class="toggle-knob"></span></button></div>
        <div class="filter-row"><span class="filter-name"><span class="dot-legend" style="background:#BA7517"></span>IMINT</span><button class="toggle on" id="t-imint" onclick="toggleLayer('imint',this)"><span class="toggle-knob"></span></button></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Ingest</div>
        <button class="ingest-btn" onclick="simulateIngest('mongodb')">↙ Pull from MongoDB</button>
        <button class="ingest-btn" onclick="simulateIngest('s3')">↙ Pull from AWS S3</button>
        <div class="drop-zone" id="drop-zone" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="handleDrop(event)">
          Drop CSV / JSON / JPG here
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-num" id="s-total">10</div><div class="stat-lbl">Total nodes</div></div>
        <div class="stat-card"><div class="stat-num" id="s-active">3</div><div class="stat-lbl">Active zones</div></div>
        <div class="stat-card"><div class="stat-num" id="s-alerts">2</div><div class="stat-lbl">Alerts</div></div>
        <div class="stat-card"><div class="stat-num" id="s-conf">87%</div><div class="stat-lbl">Confidence</div></div>
      </div>
      <div style="padding: 12px; flex: 1; overflow-y: auto;">
        <div class="sidebar-label">Node index</div>
        <div id="node-list" style="font-size: 11px;"></div>
      </div>
    </div>

    <div style="flex:1; display:flex; flex-direction:column;">
      <div id="map-area">
        <svg id="map-svg" viewBox="0 0 760 470" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="blur2"><feGaussianBlur stdDeviation="1.5"/></filter>
          </defs>
          <!-- Terrain base -->
          <rect width="760" height="470" fill="#1a2535"/>
          <!-- Grid -->
          <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="0.5">
            <line x1="0" y1="78" x2="760" y2="78"/><line x1="0" y1="156" x2="760" y2="156"/>
            <line x1="0" y1="234" x2="760" y2="234"/><line x1="0" y1="312" x2="760" y2="312"/>
            <line x1="0" y1="390" x2="760" y2="390"/>
            <line x1="152" y1="0" x2="152" y2="470"/><line x1="304" y1="0" x2="304" y2="470"/>
            <line x1="456" y1="0" x2="456" y2="470"/><line x1="608" y1="0" x2="608" y2="470"/>
          </g>
          <!-- Terrain blobs -->
          <ellipse cx="180" cy="120" rx="90" ry="60" fill="#243040" opacity="0.8"/>
          <ellipse cx="400" cy="200" rx="130" ry="80" fill="#1e2d3d" opacity="0.7"/>
          <ellipse cx="600" cy="330" rx="100" ry="70" fill="#243040" opacity="0.8"/>
          <ellipse cx="100" cy="350" rx="70" ry="50" fill="#1e2d3d" opacity="0.6"/>
          <ellipse cx="650" cy="100" rx="80" ry="55" fill="#243040" opacity="0.7"/>
          <!-- Water -->
          <ellipse cx="520" cy="140" rx="55" ry="30" fill="#0f3460" opacity="0.7"/>
          <path d="M260 380 Q310 360 360 380 Q410 400 450 375" stroke="#0f3460" stroke-width="8" fill="none" opacity="0.7"/>
          <!-- Roads -->
          <line x1="50" y1="240" x2="710" y2="240" stroke="#2a3a50" stroke-width="2"/>
          <line x1="380" y1="30" x2="380" y2="450" stroke="#2a3a50" stroke-width="2"/>
          <line x1="100" y1="100" x2="650" y2="400" stroke="#2a3a50" stroke-width="1.5"/>
          <!-- Coordinate labels -->
          <text x="8" y="16" font-size="9" fill="#ffffff" fill-opacity="0.25" font-family="monospace">32°N</text>
          <text x="8" y="94" font-size="9" fill="#ffffff" fill-opacity="0.25" font-family="monospace">31°N</text>
          <text x="8" y="172" font-size="9" fill="#ffffff" fill-opacity="0.25" font-family="monospace">30°N</text>
          <text x="8" y="250" font-size="9" fill="#ffffff" fill-opacity="0.25" font-family="monospace">29°N</text>
          <text x="8" y="328" font-size="9" fill="#ffffff" fill-opacity="0.25" font-family="monospace">28°N</text>
          <text x="8" y="406" font-size="9" fill="#ffffff" fill-opacity="0.25" font-family="monospace">27°N</text>
          <text x="150" y="464" font-size="9" fill="#ffffff" fill-opacity="0.25" font-family="monospace">69°E</text>
          <text x="300" y="464" font-size="9" fill="#ffffff" fill-opacity="0.25" font-family="monospace">71°E</text>
          <text x="450" y="464" font-size="9" fill="#ffffff" fill-opacity="0.25" font-family="monospace">73°E</text>
          <text x="600" y="464" font-size="9" fill="#ffffff" fill-opacity="0.25" font-family="monospace">75°E</text>
          <!-- Nodes rendered by JS -->
          <g id="nodes-layer"></g>
        </svg>
        <div class="toolbar">
          <button class="map-btn" title="Zoom in" onclick="zoom(1.2)">+</button>
          <button class="map-btn" title="Zoom out" onclick="zoom(0.8)">−</button>
          <button class="map-btn" title="Reset" onclick="resetZoom()">⊙</button>
        </div>
        <div id="popup" class="popup"></div>
      </div>
      <div class="log-panel" id="log-panel"></div>
    </div>
  </div>
</div>

<script>
const nodes = [
  {id:'N-001',type:'osint',label:'Social Chatter Spike',lat:31.5,lng:70.2,conf:92,src:'MongoDB',note:'Unusual comm pattern detected',img:'osint'},
  {id:'N-002',type:'osint',label:'News Aggregation',lat:30.1,lng:72.5,conf:85,src:'AWS S3',note:'12 correlated articles indexed',img:'osint'},
  {id:'N-003',type:'osint',label:'Forum Activity',lat:29.3,lng:69.8,conf:78,src:'MongoDB',note:'Encrypted forum traffic surge',img:'osint'},
  {id:'N-004',type:'osint',label:'Signal Intercept Ref',lat:31.8,lng:74.1,conf:90,src:'AWS S3',note:'Cross-reference with SIGINT log',img:'osint'},
  {id:'N-005',type:'humint',label:'Field Report Alpha',lat:30.7,lng:71.3,conf:95,src:'CSV Upload',note:'Agent contact, verified location',img:'humint'},
  {id:'N-006',type:'humint',label:'Source Debrief',lat:29.0,lng:73.2,conf:88,src:'JSON File',note:'Secondary source corroboration',img:'humint'},
  {id:'N-007',type:'humint',label:'Ground Team Log',lat:31.2,lng:72.0,conf:82,src:'CSV Upload',note:'Movement observed 04:30 local',img:'humint'},
  {id:'N-008',type:'imint',label:'SAT Image Alpha',lat:30.4,lng:70.9,conf:97,src:'JPEG Upload',note:'High-res pass, 0.3m resolution',img:'imint'},
  {id:'N-009',type:'imint',label:'SAT Image Bravo',lat:29.7,lng:74.5,conf:93,src:'JPEG Upload',note:'Thermal overlay applied',img:'imint'},
  {id:'N-010',type:'imint',label:'UAV Footage Ref',lat:31.0,lng:73.8,conf:89,src:'JPEG Upload',note:'Loiter pattern recorded 0600Z',img:'imint'},
];

const colors = { osint:'#378ADD', humint:'#3B6D11', imint:'#BA7517' };
const bgColors = { osint:'#E6F1FB', humint:'#EAF3DE', imint:'#FAEEDA' };
const textColors = { osint:'#0C447C', humint:'#27500A', imint:'#633806' };
const layers = { osint:true, humint:true, imint:true };
let scale = 1, tx = 0, ty = 0;

function latLngToXY(lat, lng) {
  const x = (lng - 68.5) / 8 * 730 + 15;
  const y = (32.5 - lat) / 5.5 * 450 + 10;
  return [x, y];
}

function renderNodes() {
  const g = document.getElementById('nodes-layer');
  g.innerHTML = '';
  nodes.forEach(n => {
    if (!layers[n.type]) return;
    const [x, y] = latLngToXY(n.lat, n.lng);
    const el = document.createElementNS('http://www.w3.org/2000/svg','g');
    el.setAttribute('class','map-node');
    el.setAttribute('transform',`translate(${x},${y})`);
    const pulse = document.createElementNS('http://www.w3.org/2000/svg','circle');
    pulse.setAttribute('r','14'); pulse.setAttribute('fill',colors[n.type]);
    pulse.setAttribute('fill-opacity','0.15'); pulse.setAttribute('class','node-pulse');
    const ring = document.createElementNS('http://www.w3.org/2000/svg','circle');
    ring.setAttribute('r','9'); ring.setAttribute('fill',colors[n.type]);
    ring.setAttribute('fill-opacity','0.25'); ring.setAttribute('stroke',colors[n.type]);
    ring.setAttribute('stroke-width','1.5');
    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('r','5'); dot.setAttribute('fill',colors[n.type]);
    const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x','12'); lbl.setAttribute('y','4');
    lbl.setAttribute('font-size','9'); lbl.setAttribute('fill','#ffffff');
    lbl.setAttribute('fill-opacity','0.8'); lbl.textContent = n.id;
    el.appendChild(pulse); el.appendChild(ring); el.appendChild(dot); el.appendChild(lbl);
    el.addEventListener('mouseenter', e => showPopup(e, n));
    el.addEventListener('mouseleave', hidePopup);
    el.addEventListener('click', () => focusNode(n));
    g.appendChild(el);
  });
  updateNodeList();
  document.getElementById('s-total').textContent = nodes.length;
}

function showPopup(e, n) {
  const popup = document.getElementById('popup');
  const mapArea = document.getElementById('map-area');
  const rect = mapArea.getBoundingClientRect();
  const svgEl = document.getElementById('map-svg');
  const svgRect = svgEl.getBoundingClientRect();
  const [nx, ny] = latLngToXY(n.lat, n.lng);
  const scaleX = svgRect.width / 760;
  const scaleY = svgRect.height / 470;
  let px = nx * scaleX + 10;
  let py = ny * scaleY - 10;
  if (px + 210 > svgRect.width) px = nx * scaleX - 220;
  if (py + 200 > svgRect.height) py = ny * scaleY - 200;
  const imgHtml = n.type === 'imint'
    ? `<div style="width:100%;height:80px;border-radius:6px;background:linear-gradient(135deg,#1a2535,#243040);display:flex;align-items:center;justify-content:center;margin-bottom:6px;font-size:10px;color:#7ee787;font-family:monospace;">[ SAT IMG ${n.id} ]</div>`
    : `<div style="width:100%;height:50px;border-radius:6px;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;margin-bottom:6px;font-size:10px;color:var(--color-text-secondary);">No imagery attached</div>`;
  popup.innerHTML = `
    <div style="font-size:10px;font-weight:500;padding:2px 6px;border-radius:99px;background:${bgColors[n.type]};color:${textColors[n.type]};display:inline-block;margin-bottom:6px;">${n.type.toUpperCase()}</div>
    <div style="font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px;">${n.label}</div>
    ${imgHtml}
    <div style="font-size:11px;color:var(--color-text-secondary);line-height:1.5;">
      <div><b>ID:</b> ${n.id}</div>
      <div><b>Source:</b> ${n.src}</div>
      <div><b>Coords:</b> ${n.lat}°N ${n.lng}°E</div>
      <div><b>Confidence:</b> ${n.conf}%</div>
      <div style="margin-top:4px;padding-top:4px;border-top:0.5px solid var(--color-border-tertiary);">${n.note}</div>
    </div>`;
  popup.style.left = px + 'px';
  popup.style.top = py + 'px';
  popup.style.display = 'block';
}

function hidePopup() {
  document.getElementById('popup').style.display = 'none';
}

function focusNode(n) {
  addLog(`info`, `Focused: ${n.id} — ${n.label} [${n.type.toUpperCase()}]`);
  updateNodeList(n.id);
}

function toggleLayer(type, btn) {
  layers[type] = !layers[type];
  btn.className = 'toggle ' + (layers[type] ? 'on' : 'off');
  renderNodes();
  addLog('info', `Layer ${type.toUpperCase()} ${layers[type] ? 'enabled' : 'disabled'}`);
}

function simulateIngest(src) {
  const fakeNodes = {
    mongodb: {id:`N-0${nodes.length+1}`,type:'osint',label:'MongoDB Record',lat:29.5+Math.random(),lng:70+Math.random()*4,conf:Math.floor(80+Math.random()*15),src:'MongoDB',note:'Auto-pulled from cluster',img:'osint'},
    s3: {id:`N-0${nodes.length+1}`,type:'osint',label:'S3 Object',lat:30+Math.random(),lng:71+Math.random()*4,conf:Math.floor(80+Math.random()*15),src:'AWS S3',note:'Retrieved from s3://intel-bucket',img:'osint'}
  };
  const n = fakeNodes[src];
  nodes.push(n);
  renderNodes();
  addLog('log', `Ingested: ${n.id} from ${n.src}`);
  document.getElementById('s-total').textContent = nodes.length;
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  const typeMap = {csv:'humint', json:'humint', jpg:'imint', jpeg:'imint'};
  const t = typeMap[ext] || 'osint';
  const n = {id:`N-0${nodes.length+1}`,type:t,label:file.name.replace(/\.[^.]+$/,''),lat:29+Math.random()*3,lng:70+Math.random()*5,conf:Math.floor(75+Math.random()*20),src:`${ext.toUpperCase()} Upload`,note:`Manually ingested: ${file.name}`,img:t};
  nodes.push(n);
  renderNodes();
  addLog('log', `Drop ingested: ${n.id} (${ext.toUpperCase()}) → ${t.toUpperCase()}`);
}

function updateNodeList(activeId) {
  const el = document.getElementById('node-list');
  el.innerHTML = nodes.slice(-8).reverse().map(n => `
    <div style="padding:5px 6px;border-radius:6px;margin-bottom:3px;background:${activeId===n.id?'var(--color-background-secondary)':'transparent'};cursor:pointer;display:flex;align-items:center;gap:6px;" onmouseenter="showPopupById('${n.id}')" onmouseleave="hidePopup()">
      <span style="width:7px;height:7px;border-radius:50%;background:${colors[n.type]};flex-shrink:0;display:inline-block;"></span>
      <span style="color:var(--color-text-primary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${n.label}</span>
      <span style="color:var(--color-text-secondary);font-size:10px;">${n.conf}%</span>
    </div>`).join('');
}

function showPopupById(id) {
  const n = nodes.find(x => x.id === id);
  if (n) showPopup(null, n);
}

let zoomLevel = 1;
function zoom(f) {
  zoomLevel = Math.max(0.5, Math.min(3, zoomLevel * f));
  document.getElementById('map-svg').style.transform = `scale(${zoomLevel})`;
  document.getElementById('map-svg').style.transformOrigin = 'center center';
}
function resetZoom() { zoomLevel = 1; document.getElementById('map-svg').style.transform = 'scale(1)'; }

const logs = [];
function addLog(type, msg) {
  const ts = new Date().toTimeString().slice(0,8);
  logs.push({type, msg, ts});
  const panel = document.getElementById('log-panel');
  const line = document.createElement('div');
  line.className = 'log-line ' + (type==='warn'?'warn':type==='info'?'info':'');
  line.textContent = `[${ts}] ${msg}`;
  panel.appendChild(line);
  panel.scrollTop = panel.scrollHeight;
}

addLog('info', 'Dashboard initialized — terrain map loaded');
addLog('log', 'Fetching OSINT from MongoDB cluster...');
addLog('log', 'Syncing S3 bucket: s3://osint-archive');
addLog('warn', 'Node N-003: low confidence (78%) — secondary source needed');
addLog('info', '10 intelligence nodes rendered on operational grid');

let tick = 0;
setInterval(() => {
  tick++;
  if (tick % 7 === 0) addLog('log', `Heartbeat OK — ${nodes.length} nodes active [${new Date().toTimeString().slice(0,8)}]`);
  if (tick % 13 === 0) addLog('warn', `Signal latency elevated on HUMINT channel`);
}, 3000);

renderNodes();
</script>
